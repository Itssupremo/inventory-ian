<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory System</title>
    <link rel="icon" type="image/png" href="/assets/inventory-icon.png?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="login-page">
    <div class="login-split">
      <div class="login-panel-left" aria-hidden="true"></div>
      <div class="login-panel-right">
        <div class="login-form-wrap" style="text-align:center">
          <h2 class="login-heading">Inventory System</h2>
          <p class="login-subtitle">Redirecting to your dashboard…</p>
          <p id="redirectMessage" class="message"></p>
        </div>
      </div>
    </div>

    <script src="/auth.js"></script>
    <script>
      (async () => {
        const message = document.getElementById('redirectMessage');
        try {
          const current = await window.Auth.getCurrentUser();
          if (!current) {
            window.location.replace('/login.html');
            return;
          }
          window.location.replace(current.role === 'Administrator' ? '/admin.html' : '/user.html');
        } catch (err) {
          message.textContent = err.message || 'Unable to redirect.';
          message.className = 'message error';
          setTimeout(() => {
            window.location.replace('/login.html');
          }, 1200);
        }
      })();
    </script>
  </body>
</html>
